<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Time Announcer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Time Announcer">

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: background 0.3s;
  }

  #clock {
    font-size: 8rem;
    font-weight: 600;
    letter-spacing: 0.1rem;
    margin-bottom: 1rem;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    width: 90%;
    max-width: 500px;
    opacity: 0.8;
  }

  label {
    font-size: 0.9rem;
    opacity: 0.7;
  }

  select, input[type="range"] {
    width: 100%;
    margin-top: 6px;
    margin-bottom: 16px;
  }
</style>
</head>

<body>

<div id="clock">00:00</div>
<p>Tap anywhere to hear the time</p>

<div id="controls">
  <label for="voiceSelect">Voice</label>
  <select id="voiceSelect"></select>

  <label for="dimmer">Screen Brightness</label>
  <input type="range" id="dimmer" min="10" max="100" value="100">
  </div>

<script>
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString("en-GB", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
  document.getElementById("clock").textContent = time;
}

setInterval(updateClock, 1000);
updateClock();

// ----------------------
// Voice Selector
// ----------------------
let availableVoices = [];

function loadVoices() {
  availableVoices = speechSynthesis.getVoices();

  const select = document.getElementById("voiceSelect");
  select.innerHTML = "";

  availableVoices.forEach((v, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `${v.name} (${v.lang})`;
    select.appendChild(option);
  });

  const aussie = availableVoices.findIndex(v => v.lang === "en-AU");
  if (aussie >= 0) select.value = aussie;
}

speechSynthesis.onvoiceschanged = loadVoices;

// ----------------------
// Speak Time
// ----------------------
function speakTime() {
  speechSynthesis.cancel();

  const now = new Date();
  const time = now.toLocaleTimeString("en-GB", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });

  const utterance = new SpeechSynthesisUtterance(`The time is ${time}`);
  utterance.rate = 0.95;

  const selected = document.getElementById("voiceSelect").value;
  if (availableVoices[selected]) {
    utterance.voice = availableVoices[selected];
  }

  speechSynthesis.speak(utterance);
}

document.body.addEventListener("click", speakTime);
document.body.addEventListener("touchend", speakTime);

// ----------------------
// Night Mode Dimmer
// ----------------------
document.getElementById("dimmer").addEventListener("input", e => {
  const value = e.target.value;
  document.body.style.background = `rgba(0,0,0,${value/100})`;
});

// ----------------------
// Service Worker
// ----------------------
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
