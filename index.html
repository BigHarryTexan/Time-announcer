<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Time Announcer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Time Announcer">

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: background 0.3s;
  }

  #clock {
    font-size: 8rem;
    font-weight: 600;
    letter-spacing: 0.1rem;
    margin-bottom: 1rem;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    width: 90%;
    max-width: 500px;
    opacity: 0.8;
  }

  label {
    font-size: 0.9rem;
    opacity: 0.7;
  }

  select, input[type="range"] {
    width: 100%;
    margin-top: 6px;
    margin-bottom: 16px;
  }
</style>
</head>

<body>

<div id="clock">00:00</div>
<p>Tap anywhere to hear the time</p>

<div id="controls">
  <label for="voiceSelect">Voice</label>
  <select id="voiceSelect"></select>

  <label for="dimmer">Screen Brightness</label>
  <input type="range" id="dimmer" min="10" max="100" value="100">
